name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
      # gen-headers.ts regenerates public/_headers in-place during prebuild, so a
      # commit that edits security-headers.ts without the regenerated _headers
      # would otherwise pass silently. Fail if the committed file drifted from its
      # source of truth.
      - name: Check public/_headers is not stale
        run: git diff --exit-code public/_headers
